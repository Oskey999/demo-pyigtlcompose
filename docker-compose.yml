version: '3.8'

services:
  tmsserver:
    build:
      context: .
      dockerfile: dockerfiles/tmsserver/Dockerfile
    image: tmsserver
    container_name: tmsserver
    environment:
       - TMS_SERVER_IFACE=${TMS_SERVER_IFACE:-eth0}
       - DEBUG=1
       - LOG_LEVEL=DEBUG
    ports:
      - "18944:18944"
      - "18945:18945"
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - tms-network
    volumes:
    - ./SlicerTMS/data:/app/data
      
    # healthcheck:

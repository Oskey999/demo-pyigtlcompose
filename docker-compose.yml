  SlicerApp:
    build:
      context: .
      dockerfile: dockerfiles/optimized/dockerfile.buildkit-full
    image: optimized
    container_name: optimized 
    environment:
      #username kasm_user 
      - VNC_PW=yourpassword
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DEBUG=1
      - LOG_LEVEL=DEBUG
      - TMS_SERVER_HOST=tmsserver
      - TMS_SERVER_PORT_1=18944
      - TMS_SERVER_PORT_2=18945
      - RESULTS_CSV_PATH=/app/evaluations/results.csv
    # volumes:
    #   - /path/to/data:/config
    ports:
      - 3002:6900
      - 3003:6901
      - 5901:5901
    shm_size: "1gb"
    stdin_open: true
    tty: true
    restart: always
    depends_on:
      - tmsserver
    networks:
      - tms-network
    volumes:
    - ./SlicerTMS/data:/root/slicer/packages/Slicer-*/lib/Slicer-5.8/qt-scripted-modules/data
    - ./evaluations:/app/evaluations

  stats-monitor:
    image: python:3.11-slim
    container_name: stats-monitor
    working_dir: /workspace
    volumes:
      - ./evaluations:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - RESULTS_CSV_PATH=/workspace/results.csv
      - PYTHONUNBUFFERED=1
    entrypoint: ["/bin/sh", "-c"]
    command: ["chmod +x /workspace/init-permissions.sh && /workspace/init-permissions.sh && pip install --quiet docker && python -u update.py"]
    restart: unless-stopped
    networks:
      - tms-network
    depends_on:
      - tmsserver

    

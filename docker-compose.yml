  ROSsim:
    image: rossim
    container_name: rossim
    build:
      context: .
      dockerfile: dockerfiles/ROS2armsim/Dockerfile.buildkit.fixed
      # Add build arguments for memory control
      shm_size: 2gb
    ports:
      - "3000:3000"
      # just for record
      - "5900:5900"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Perth
      - SUBFOLDER=/
      - TITLE=ROS2 Simulator
    volumes:
        - ./config:/config
        - ./dockerfiles/ROS2armsim/data/moveit2_tutorials:/opt/ws_moveit/src/moveit2_tutorials
    shm_size: 2gb
    # Add memory limits to prevent OOM during runtime
    mem_limit: 4g
    memswap_limit: 4g
    restart: unless-stopped
    networks:
      - tms-network

  ROSadapter_MoveIt:
    image: rosadapter_moveit
    container_name: rosadapter_moveit
    build:
      context: .
      dockerfile: dockerfiles/ROSadapter/dockerfile
    mem_limit: 4g
    memswap_limit: 4g
    restart: unless-stopped
    networks:
      - tms-network
    #   - /dev/dri:/dev/dri

  ROSadapter_Phosphobot:
    image: rosadapter_phosphobot
    container_name: rosadapter_phosphobot
    build:
      context: .
      dockerfile: dockerfiles/ROSadapter_Phosphobot/Dockerfile
    mem_limit: 2g
    memswap_limit: 2g
    restart: unless-stopped
    networks:
      - tms-network
    environment:
      # Phosphobot physical arm synchronization
      - PHOSPHOBOT_ENABLED=true
      - PHOSPHOBOT_HOST=192.168.86.27
      - PHOSPHOBOT_PORT=80


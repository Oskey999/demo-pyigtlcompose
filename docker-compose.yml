    # Use testcontainers vnc-recorder image to record individual containers
    # We'll shell out to docker run commands
# ── REST API reference ──────────────────────────────────────────────────────
#
#  Check status:               curl http://localhost:8080/status
#  Start split-screen:         curl -X POST http://localhost:8080/record_split
#  Stop split-screen:          curl -X POST http://localhost:8080/stop_split
#  Record one container only:  curl -X POST http://localhost:8080/record/rossim
#  Stop one container:         curl -X POST http://localhost:8080/stop/rossim
#  Stop everything:            curl -X POST http://localhost:8080/stop_all

networks:
  tms-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16